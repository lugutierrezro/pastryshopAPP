name: pastryshop
description: "La Pastelería — App móvil para gestión de pedidos y catálogo."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.6.2

  # Images
  cached_network_image: ^3.4.1

  # Formatting
  intl: ^0.19.0

  # UI extras
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8
  fl_chart: ^0.69.0
  badges: ^3.1.2

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  image_picker: ^1.2.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  pdf: ^3.11.3
  printing: ^5.14.3
  firebase_core: ^4.9.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
